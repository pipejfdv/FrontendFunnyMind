<ion-content>
  <div class="register">
    <a routerLink="/login" class="register__back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Volver al login
    </a>

    <!-- Membership Selection -->
    <section *ngIf="!selectedMembership" class="register__plans">
      <h1 class="register__title">Crear Cuenta</h1>
      <p class="register__sub">Elige el plan que mejor se adapte a ti</p>

      <div class="register__cards">
        <button *ngFor="let m of memberships"
                class="plan-card"
                [class.plan-card--selected]="false"
                [style.--plan-color]="m.color"
                (click)="selectMembership(m.type)">
          <div class="plan-card__badge" [style.background]="m.color">{{ m.price }}</div>
          <h2 class="plan-card__name">{{ m.name }}</h2>

          <ul class="plan-card__features">
            <li *ngFor="let f of m.features">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
              {{ f }}
            </li>
          </ul>

          <ul class="plan-card__limitations" *ngIf="m.limitations.length">
            <li *ngFor="let l of m.limitations">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
              {{ l }}
            </li>
          </ul>
        </button>
      </div>
    </section>

    <!-- Registration Form -->
    <section *ngIf="selectedMembership" class="register__form">
      <button (click)="backToPlans()" class="register__form-back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Cambiar plan
      </button>

      <span class="register__form-badge" [style.background]="selectedMembership === 'DemoUser' ? '#4ECDC4' : '#FF6B6B'">
        {{ selectedMembership === 'DemoUser' ? 'Plan Demo' : 'Plan Premium' }}
      </span>

      <h2 class="register__form-title">Crea tu cuenta</h2>
      <p class="register__form-sub">Ingresa tus datos para empezar</p>

      <div class="register__fields">
        <div class="register__field">
          <label>Usuario</label>
          <input [(ngModel)]="username" type="text" placeholder="Elige un nombre de usuario" />
        </div>
        <div class="register__field">
          <label>Correo electrónico</label>
          <input [(ngModel)]="email" type="email" placeholder="correo@ejemplo.com" />
        </div>
        <div class="register__field">
          <label>Contraseña</label>
          <input [(ngModel)]="password" type="password" placeholder="Mínimo 4 caracteres" />
        </div>
        <div class="register__field">
          <label>Confirmar contraseña</label>
          <input [(ngModel)]="confirmPassword" type="password" placeholder="Repite tu contraseña" />
        </div>
      </div>

      <p *ngIf="error" class="register__error">{{ error }}</p>

      <button (click)="register()" class="register__submit" [disabled]="loading">
        {{ loading ? 'Creando cuenta...' : 'Crear cuenta' }}
      </button>

      <p class="register__note">
        Al crear tu cuenta serás redirigido al inicio de sesión.
      </p>
    </section>
  </div>
</ion-content>
