<ion-content>
  <div class="child-dash">
    <header class="child-dash__header">
      <div class="child-dash__top">
        <div class="child-dash__user">
          <span *ngIf="!isPremiumFlow" class="child-dash__avatar">😊</span>
          <span *ngIf="selectedChild" class="child-dash__avatar">{{ selectedChild.avatar || '😊' }}</span>
          <div>
            <h1 class="child-dash__greeting">
              ¡Hola, {{ selectedChild?.names || auth.currentUser()?.name }}!
            </h1>
            <p class="child-dash__sub">¿A qué quieres jugar hoy?</p>
          </div>
        </div>
        <div class="child-dash__actions">
          <a *ngIf="isPremiumFlow" routerLink="/guardian" class="child-dash__icon-btn" title="Volver">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          </a>
          <button (click)="auth.logout()" class="child-dash__icon-btn" title="Cerrar sesión">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          </button>
        </div>
      </div>
    </header>

    <section class="child-dash__categories">
      <div *ngFor="let cat of categories" class="category-section">
        <div class="category-section__head">
          <span class="category-section__emoji">{{ catEmojis[cat.name] || '🎮' }}</span>
          <div>
            <h2 class="category-section__title">{{ cat.name }}</h2>
            <p class="category-section__desc">{{ cat.description }}</p>
          </div>
        </div>

        <div class="category-section__games">
          <a *ngFor="let game of getGamesByCategory(cat.id)"
             [routerLink]="game.id === '1' ? '/game/hanoi' : game.id === '2' ? '/game/memory' : '/game/reaction'" [queryParams]="isPremiumFlow ? {from: 'child'} : undefined"
             class="game-row"
             [style.--game-color]="game.color">
            <div class="game-row__icon" [style.background]="game.color">
              <span>{{ catEmojis[cat.name] || '🎮' }}</span>
            </div>
            <div class="game-row__info">
              <strong class="game-row__name">{{ game.name }}</strong>
              <span class="game-row__desc">{{ game.description }}</span>
            </div>
            <span class="game-row__play">Jugar</span>
          </a>
        </div>
      </div>
    </section>
  </div>
</ion-content>
